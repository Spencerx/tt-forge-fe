name: Manual Release Test

on:
  workflow_dispatch:

permissions:
  actions: write
  id-token: write
  packages: write
  checks: write
  contents: write

jobs:

  docker-build:
    uses: ./.github/workflows/build-image.yml
    secrets: inherit

  build:
    needs:
      - docker-build
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      build: Release

  release-docker:
    if: success() || failure()
    needs:
      - docker-build
      - build
    runs-on: ubuntu-latest
    outputs:
      docker_image: ${{ steps.build-docker.outputs.docker_image }}
    steps:
      - name: Fix workspace permissions issue
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Download wheel
        uses: actions/download-artifact@v6
        with:
          name: forge-wheel
          path: .

      - name: Build & push Docker image
        shell: bash
        id: build-docker
        run: |
          set -eo pipefail

          docker_tag=${{ github.sha }}
          IMAGE_NAME=ghcr.io/tenstorrent/tt-forge-onnx/tt-forge-onnx-release

          if docker manifest inspect $IMAGE_NAME:$docker_tag > /dev/null; then
            echo "Docker image $IMAGE_NAME:$docker_tag exists"
          else
            echo "Building image $IMAGE_NAME:$docker_tag"
            docker build \
              --progress=plain \
              -t $IMAGE_NAME:$docker_tag \
              -f .github/Dockerfile.release-ubuntu .

            echo "Pushing image $IMAGE_NAME:$docker_tag"
            docker push $IMAGE_NAME:$docker_tag
          fi

          echo "docker_image=$IMAGE_NAME:$docker_tag" >> "$GITHUB_OUTPUT"

  basic-tests:
    needs: [ release-docker ]
    uses: tenstorrent/tt-forge/.github/workflows/basic-tests.yml@main
    secrets: inherit
    with:
      docker-image: ${{ needs.release-docker.outputs.docker_image }}
      ref: main
      project-filter: tt-forge-onnx

  demo-tests:
    needs: [ release-docker ]
    uses: tenstorrent/tt-forge/.github/workflows/demo-tests.yml@main
    secrets: inherit
    with:
      docker-image: ${{ needs.release-docker.outputs.docker_image }}
      ref: main
      project-filter: tt-forge-onnx
