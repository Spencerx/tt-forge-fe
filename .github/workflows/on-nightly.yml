name: On nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day

permissions:
  contents: write
  actions: write
  id-token: write
  packages: write
  checks: write

jobs:
  docker-build:
    uses: ./.github/workflows/build-image.yml
    secrets: inherit

  build:
    needs: docker-build
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      build: 'Release'

  test_forge_model:
    needs:
      - docker-build
      - build
    uses: ./.github/workflows/test-sub.yml
    secrets: inherit
    with:
      test_mark: 'nightly'
      test_group_cnt: 6
      test_group_ids: '[1,2,3,4,5,6]'
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      run_id: ${{ github.run_id }}
      runs-on: '[{"runs-on": "n150"}]'
      tests_to_filter: 'forge/test/models/tensorflow,forge/test/models/onnx,forge/test/models/paddlepaddle'
      enable-verbose-output: true

  benchmark:
    needs:
      - docker-build
      - build
    uses: ./.github/workflows/benchmark-sub.yml
    secrets: inherit
    with:
      test_group_cnt: '1'
      test_group_ids: '[1]'
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      run_id: ${{ github.run_id }}
      runs-on: '[{"runs-on": "n150"}]'
      tests_to_filter: 'forge/test/benchmark'
      enable-verbose-output: true

  release:
    uses: ./.github/workflows/call-release.yml
    needs: [ build ]
    secrets: inherit
    with:
      artifact_release_run_id: ${{ needs.build.outputs.run_id }}
      wheel_release_artifact_name: forge-wheel
      is_nightly_release: true
