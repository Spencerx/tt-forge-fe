name: Pre-commit

on:
  workflow_dispatch:
  workflow_call:

jobs:
  pre-commit:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - uses: pre-commit/action@v3.0.1
