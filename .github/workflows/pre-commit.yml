name: Pre-commit

on:
  workflow_dispatch:
  workflow_call:

jobs:
  pre-commit:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          cache: 'uv'
      - name: Run pre-commit
        run: uvx pre-commit run --all-files
