name: Build release Docker image (call)

on:
  workflow_call:
    inputs:
      wheel_release_artifact_run_id:
        description: 'Run id of the release wheel'
        type: string
        required: true
      wheel_release_artifact_name:
        description: 'Artifact name of the wheel (contains both tt_forge_onnx and tt_tvm wheels)'
        type: string
        required: true
      wheel_version_override:
        description: 'Wheel version override value'
        type: string
        required: false
      forge_onnx_sha_override:
        description: 'Git SHA of commit in tenstorrent/tt-forge-onnx or branch name'
        required: false
        type: string
        default: ${{ github.sha }}
      caller_workflow:
        description: 'Name of the caller workflow'
        required: false
        type: string
    outputs:
      docker_image:
        description: 'Built and pushed docker image'
        value: ${{ jobs.build-release-docker.outputs.docker-image }}
      docker_image_base:
        description: 'Built and pushed docker image base'
        value: ${{ jobs.build-release-docker.outputs.docker-image-base }}

jobs:
  build-release-docker:
    name: Build tt-forge-onnx release Docker image
    runs-on: ubuntu-latest
    outputs:
      docker-image: ${{ steps.build-docker.outputs.docker-image }}
      docker-image-base: ${{ steps.build-docker.outputs.docker-image-base }}
    steps:
      - name: Fix workspace permissions issue
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Download wheels
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading wheels from: ${{ github.repository }} run_id ${{ inputs.wheel_release_artifact_run_id }} name ${{ inputs.wheel_release_artifact_name }}"
          gh run download ${{ inputs.wheel_release_artifact_run_id }} \
            --repo ${{ github.repository }} \
            --dir . \
            --name ${{ inputs.wheel_release_artifact_name }}

          echo "Downloaded wheels"
          ls -l *.whl

      - name: Rename wheels
        shell: bash
        if: ${{ inputs.wheel_version_override != '' }}
        run: |
          tag="${{ inputs.wheel_version_override }}"

          .github/scripts/modify_wheel_version.sh tt_forge_onnx*.whl $tag
          .github/scripts/modify_wheel_version.sh tt_tvm*.whl $tag

      - name: Build & push Docker image
        shell: bash
        id: build-docker
        run: |
          set -eo pipefail

          docker_tag="${{ inputs.forge_onnx_sha_override }}"

          .github/build-release-docker-image.sh $docker_tag | tee docker.log

          docker_image=$(tail -n 1 docker.log)
          docker_image_base=$(tail -n 2 docker.log | head -n 1)
          echo "Docker image built and pushed: $docker_image"
          echo "docker-image=$docker_image" >> "$GITHUB_OUTPUT"
          echo "docker-image-base=$docker_image_base" >> "$GITHUB_OUTPUT"

  release-tests:
    uses: ./.github/workflows/call-release-tests.yml
    needs: [ build-release-docker ]
    secrets: inherit
    with:
      release_docker_image: ${{ needs.build-release-docker.outputs.docker-image }}
      caller_workflow: ${{ inputs.caller_workflow }}
